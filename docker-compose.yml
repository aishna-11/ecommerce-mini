version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mini_ecommerce
    networks:
      - ecommerce-network

  # Backend API Server
  backend:
    build: ./backend
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mini_ecommerce
      - JWT_SECRET=docker_secret_key_change_in_production
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend
      - /app/node_modules
    networks:
      - ecommerce-network
    command: sh -c "npm install && node server.js"

volumes:
  mongodb_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
