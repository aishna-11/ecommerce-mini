<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storehouse — Shop</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">Store<span>house</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Shop</a>
    <a href="cart.html" class="nav-link cart-link">Cart <span id="cart-count" class="cart-badge">0</span></a>
  </div>
  <div id="auth-area"></div>
</nav>

<div class="container">
  <section class="hero">
    <h1>Everyday goods, honestly priced.</h1>
    <p>Browse the full catalog below — add anything to your cart and check out in a couple of clicks.</p>
  </section>

  <div class="filters">
    <input type="text" id="search-input" placeholder="Search products..." />
    <select id="category-select">
      <option value="">All categories</option>
    </select>
  </div>

  <div class="section-title">
    <h2>All Products</h2>
  </div>

  <div id="product-grid" class="grid">
    <div class="loading">Loading products...</div>
  </div>
</div>

<footer class="footer">Mini E-Commerce Website — Task 04 demo project</footer>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
