<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopZone — Online Shopping</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Navbar ── -->
<header class="navbar">
  <div class="navbar-top">
    <!-- Logo -->
    <a href="index.html" class="brand">Shop<span>Zone</span></a>

    <!-- Search -->
    <div class="navbar-search">
      <input type="text" id="nav-search" placeholder="Search products, brands and more…" autocomplete="off" />
      <button class="search-btn" id="nav-search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#131921" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Nav actions -->
    <nav class="nav-actions">
      <div id="auth-area"></div>

      <a href="cart.html" class="cart-link">
        <div class="cart-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="#fff" stroke-width="1.8"/><path d="M16 10a4 4 0 0 1-8 0" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span id="cart-count" class="cart-badge">0</span>
        </div>
        <span class="cart-label">Cart</span>
      </a>
    </nav>
  </div>

  <!-- Category strip -->
  <nav class="cat-nav">
    <a href="index.html">All</a>
    <a href="index.html?cat=Electronics">Electronics</a>
    <a href="index.html?cat=Clothing">Clothing</a>
    <a href="index.html?cat=Books">Books</a>
    <a href="index.html?cat=Home">Home &amp; Kitchen</a>
    <a href="index.html?cat=Sports">Sports</a>
    <a href="index.html?cat=Toys">Toys</a>
    <a href="index.html?cat=Beauty">Beauty</a>
    <a href="index.html?cat=Grocery">Grocery</a>
  </nav>
</header>

<!-- ── Main Content ── -->
<div class="container">

  <!-- Hero -->
  <section class="hero-banner">
    <h1>Big savings. Every day.</h1>
    <p>Discover millions of products — shipped fast and priced right.</p>
  </section>

  <!-- Filters -->
  <div class="filters">
    <input type="text" id="search-input" placeholder="Search products…" />
    <select id="category-select">
      <option value="">All categories</option>
    </select>
  </div>

  <!-- Product grid -->
  <div class="section-title">
    <h2>Results</h2>
  </div>

  <div id="product-grid" class="grid">
    <div class="loading">Loading products…</div>
  </div>
</div>

<!-- ── Footer ── -->
<footer class="footer">
  &copy; 2025 ShopZone, Inc. &nbsp;|&nbsp; <a href="#">Conditions of Use</a> &nbsp;|&nbsp; <a href="#">Privacy Notice</a>
</footer>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
  // Wire the hero search to the filter input
  document.getElementById('nav-search-btn').addEventListener('click', () => {
    const q = document.getElementById('nav-search').value;
    document.getElementById('search-input').value = q;
    document.getElementById('search-input').dispatchEvent(new Event('input'));
    document.getElementById('search-input').scrollIntoView({ behavior: 'smooth' });
  });
  document.getElementById('nav-search').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('nav-search-btn').click();
  });
</script>
</body>
</html>
