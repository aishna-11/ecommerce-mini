<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — ShopZone</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="navbar">
  <div class="navbar-top" style="justify-content:center;">
    <a href="index.html" class="brand" style="font-size:28px;">Shop<span>Zone</span></a>
  </div>
</header>

<div class="container">
  <div class="form-card">
    <h1>Create account</h1>
    <div id="alert-box" class="alert alert-error"></div>

    <form id="register-form">
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="First and last name" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" minlength="6" placeholder="At least 6 characters" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="border-radius:4px; font-size:14px;">
        Create your ShopZone account
      </button>
    </form>

    <p style="font-size:12px; color:var(--muted); margin:16px 0; line-height:1.6;">
      By creating an account you agree to ShopZone's Conditions of Use and Privacy Notice.
    </p>

    <hr class="form-divider" />

    <p style="font-size:14px; margin:0; text-align:center;">
      Already have an account?
      <a href="login.html" style="color:var(--amz-link);">Sign in</a>
    </p>
  </div>
</div>

<footer class="footer">
  &copy; 2025 ShopZone, Inc. &nbsp;|&nbsp; <a href="#">Conditions of Use</a> &nbsp;|&nbsp; <a href="#">Privacy Notice</a>
</footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
