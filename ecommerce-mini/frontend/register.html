<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register — Storehouse</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">Store<span>house</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Shop</a>
    <a href="cart.html" class="nav-link cart-link">Cart <span id="cart-count" class="cart-badge">0</span></a>
  </div>
  <div id="auth-area"></div>
</nav>

<div class="container">
  <div class="form-card">
    <h1>Create your account</h1>
    <p class="subtitle">Sign up to start shopping.</p>
    <div id="alert-box" class="alert alert-error"></div>

    <form id="register-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <div class="form-footer-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
